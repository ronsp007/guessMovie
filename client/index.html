<!DOCTYPE html>
<html lang ="eng">
    <head>
        <meta charset="utf-8">
        <meta name="authors" content="Ronja Spies, Ellen Sundblad, Clara Nordström">
        <meta name="description" content="A small quiz game, Guess the Movie, look at a picture and guess the right movie."> <!--beskrivnig
        (ÄNDRA OM VI GÖR FLER SPEL)-->
        <meta name="keywords" content="guess the movie, quiz, game, movie,compete,challange">

        <link rel = "stylesheet" href="styles.css">
        <script src ="scripts.js"></script>

        <title>Guess the Movie</title>
    </head>

    <body>
        <div class="frontpage"> <!--frontpage-->

            <div> <!--Title-->

                <h1 id="intro-text1">Welcome To</h1>
                 <h2 id="intro-text2">Guess The Movie</h2>
            </div>
            
            <div>
                 <div  id="press-to-play-button"> <!--Play button-->
                    <button id="play-button" onclick = "displayGameView()"> Press to play</button>
                <div>

                <div id="language-container"> <!--drop down button-->
                    <button id="language-button" onclick > Language</button>
                </div>
              
                </div>
            </div>
    
            </div>


            <div class="main-page"> <!--Spelet(baksida)--> 

                <div class="header-main"> <!--Header--> 

                    <div id="title-main"> 
                        <h1>Guess the movie</h1>
                    </div> 

                    <div id="dropdown-language-main"> 
                        <div class="dropdown"> 
                            <button class="dropbtn">Language</button> 
                                <div class="dropdown-content"> 
                                    <button onclick>Swedish</button> 
                                    <button onclick>English</button> 
                            </div> 
                        </div> 
                         
                    </div>


                </div> 

                <div class="game-options"> <!--Choose game-buttons--> 

                    <button onclick id="game1-button">Game 1</button> 
                    <button onclick id="game2-button">Game 2</button> 

                </div> 

                <div class="game-center"> <!--Game center--> 

                    <div id="rules-container"> <!--Rules--> 

                        <div id="rules"> 
                            <h2>Rules</h2> 
                            <p>...</p> 
                        </div> 

                    </div> 


                <div id="game"> <!--Game display--> 

                    <div id="game-display"> 

                        <!--Here the game will be called through a function--> 

                        <div id="start-box"> <!--Start box for game--> 

                            <p> 
                                <label for="entry_name">Entry name:</label> 
                                <input type="text" id="entry_name" name="entry_name" minlength="1" /> 
                            </p> 

                            <div class="dropdown"> 
                                <button class="dropbtn">Difficulty</button> 
                                <div class="dropdown-content"> 
                                    <button onclick class="difficulty-buttons">Easy</button> 
                                    <button onclick class="difficulty-buttons">Medium</button> 
                                    <button onclick class="difficulty-buttons">Hard</button> 
                                </div> 
                            </div> 

                        </div> 
                    </div> 

                    <div id="aswer-buttons-display"> 
                        <!--Temporary, buttons will be created through a functoin in client.js--> 
                        <button onclick>Guess</button> 
                        <button onclick>the</button> 
                        <button onclick>movie</button> 

                        <div id="submit-container"> 
                            <button onclick id="submit-button">Submit</button> 
                        </div> 

                    </div> 

                </div> 

                <div id="leaderboard-container"> <!--Leaderboard--> 

                    <div id="leaderboard"> 
                        <h2>Leaderboard</h2> 
                        <p>...</p> 
                    </div> 

                </div> 

            </div> 

            <div class="bottom-page"> <!--Bottom of page--> 

                <p>...</p> 

            </div> 

        </div> 




    </body>

</html>
