<!DOCTYPE html>
<html lang ="sv">
    <head>
        <meta charset="utf-8">
        <meta name="authors" content="Ronja Spies, Ellen Sundblad, Clara Nordström">
        <meta name="description" content="A small quiz game, Guess the Movie, look at a picture and guess the right movie.">
        <meta name="keywords" content="guess the movie, quiz, game, movie, compete, challenge">

        <link rel = "stylesheet" type="text/css" href="stylesFront.css">
        <link rel = "stylesheet" type="text/css" href="stylesMain.css">
        <script src ="scripts.js"></script>
        
        <title>Guess the Movie</title>
    </head>

    <body>

        <div class="frontpage"> <!-- Frontpage of the webpage -->

            <div> <!--Title/Intro text-->
                <div id="intro1-front">
                    <h1 id="intro-text1">Välkommen till</h1>
                </div>

                <div id="intro2-front">
                    <h2 id="intro-text2">Guess The Movie</h2>
                </div>
            </div>
            
            <div> <!--Buttons of the frontpage: play and language-->
                <div  id="play-button-container"> <!--Play button-->
                    <button id="play-button" onclick = "displayGameView()">Tryck för att spela</button>
                </div>

                <div id="language-container"> <!--Language dropdown button-->
                    <div class="dropdown"> 
                        <button id="language-button">Språk</button> 
                            <div class="dropdown-content" id="dropdown-content-front"> 
                                <button onclick="language('swe')" class="button-standard">Svenska</button> 
                                <button onclick="language('eng')" class="button-standard">Engelska</button> 
                            </div> 
                    </div> 
                         
                </div>

            </div>
        
        </div>


        <div class="main-page"> <!--The mainpage of the webpage--> 

            <div id="header-main"> <!--Header container: Title and clapperboards--> 

                <div class="clapperboard">
                    <div class="clapper-top"></div>
                    <div class="clapper-bottom"></div>
                </div>

                <div id="title-main"> 
                    <h1>Guess the movie</h1>
                </div> 

                <div class="clapperboard" id="clapperBoardLeft">
                    <div class="clapper-top"></div>
                    <div class="clapper-bottom"></div>
                </div>

            </div> 

            <div id="game-chooser-container"> <!--Container for choosing different games-->
                <button class="button-standard" id="yearGame" name="gameChooser" >År</button>
                <button class="button-standard" id="descriptionGame" name="gameChooser" >Beskrivning</button>
                <button class="button-standard" id="directorGame" name="gameChooser">Regissör</button>
                <button class="button-standard" id="actorsGame" name="gameChooser" >Skådespelare</button>
            </div>

            <div class="game-center"> <!--Center container, where the game will be displayed as well as rules and leaderboard--> 

                <div id="instructions-container"> <!--Rules--> 
                    <div id="instructions"> 
                        <h2>Instruktioner</h2> 
                        <ul id="instructions-list">
                            <!--
                            <li>Skriv användarnamn och välj svårighetsgrad.</li>
                            <li>Affisher av olika filmer kommer visas efter varandra</li>
                            <li>Välj det korrekta utgivnings året bland alternativen och tryck på bekräfta.</li>
                            <li>Rätt svar kommer visas efter varje film</li>
                            <li>Tryck på "Nästa fråga" för att gå vidare</li>
                            <li>Resultatet visas på slutet. Lycka till!</li>
                            -->
                        </ul>     
                    </div> 
                </div> 

                <div id="game"> <!--Display of the actual game--> 

                    <div id="game-display"> 

                        <div id="restart-game"> <!--Button to restart a game-->
                            <button onclick="newGame()" class="button-standard">Starta om</button>
                        </div>  

                        <div id="start-box"> <!--Start box for game: Entry name and difficulty--> 

                            <p> 
                                <label for="entry_name">Användarnamn:</label> 
                                <input type="text" id="entry_name" name="entry_name" minlength="1"> 
                            </p> 

                            <div class="dropdown"> <!--Dropdown button for difficulty levels-->
                                <button class="button-standard" id="difficulty-button">Svårighetsgrad</button> 
                                <div class="dropdown-content"> 
                                    <button onclick="startGame('easy')" class="button-standard">Enkel</button> 
                                    <button onclick="startGame('normal')" class="button-standard">Medium</button> 
                                    <button onclick="startGame('hard')" class="button-standard">Svår</button> 
                                </div> 
                            </div> 

                        </div> 

                        <div class="game-running" id="end-game"> <!--Display for end of game information-->
                            <button onclick="newGame()" class="button-standard">Nytt spel</button>
                            <p>Grattis!</p>
                            <p>Ditt poäng: </p>
                            <p id="score-display"></p>
                            
                        </div>

                        <div class ="game-running" id="game-content"> <!--Question content-->
                            <p id="movie-question"></p>
                            <img src="placeholder" id="movie-picture" alt="AI generated movie poster">
                        </div>

                        <div id="info-display"> <!--Correct answer display-->
                            <div id="text-display">
                                <p id="game-text-display"></p>
                            </div> 
                        </div>                   

                        <div class="game-running" id="answer-buttons-display"> 
                            <!--buttons will be created through a function in spripts.js--> 
                        </div> 

                        <div class="game-running" id="submit-container"> <!--Submit button-->
                            <button onclick="submitQuestion()" class="button-standard">Bekräfta</button>
                        </div> 

                        <div class="game-running" id="next-question-container"> <!--Button to display next question-->
                            <button onclick="nextQuestion()" class="button-standard">Nästa fråga</button>
                        </div>

                    </div> 

                </div> 

                <div id="leaderboard-container"> <!--Leaderboard--> 
                    <div id="leaderboard"> 

                        <h2>Leaderboard</h2>

                        <div id="leaderboard-buttons">
                            <button class="button-standard" id="easy" name="leaderboard-chooser" >Enkel</button>
                            <button class="button-standard" id="normal" name="leaderboard-chooser" >Medel</button>
                            <button class="button-standard" id="hard" name="leaderboard-chooser" >Svår</button>
                        </div>

                        <table id="leaderboard-text">
                            <tr>
                                <th>Namn</th>
                                <th>Poäng</th>
                            </tr>
                        </table>

                    </div> 

                </div> 

            </div> 

        </div> 

    </body>

</html>
